# tasks file for docker-deluge

- name: Install Python tools for docker
  pip:
    name: docker
    state: latest
  tags:
    - deluge
    - arr

- name: Private Arr network
  community.docker.docker_network:
    name: "{{ arr_network_name }}"
    internal: true
    labels:
      arr: "true"
  tags:
    - deluge
    - arr

- name: 'Create directory for container data'
  ansible.builtin.file:
    path: "{{ docker_data_dir }}/{{ dir }}"
    owner: 'docker'
    group: 'docker'
    mode: '0750'
    state: 'directory'
  loop:
    - 'deluge_data'
    - 'deluge_config'
  loop_control:
    loop_var: 'dir'
  tags:
    - deluge
    - arr

- name: Create NFS mount downloads
  community.docker.docker_volume:
    name: arr-downloads
    state: present
    driver: local
    recreate: options-changed
    driver_options:
      type: "{{ vault_arr_downloads_mount.type }}"
      o: "{{ vault_arr_downloads_mount.opts }}"
      device: "{{ vault_arr_downloads_mount.device }}"
  tags:
    - deluge
    - arr


- name: Create and Update Deluge Container
  community.docker.docker_container:
    name: deluge
    image: "lscr.io/linuxserver/deluge:{{ deuluge_version }}"
    state: started
    restart_policy: unless-stopped
    recreate: yes
    restart: yes
    pull: true
    container_default_behavior: no_defaults
    # exposed_ports:
    #   - "8112"
    #   - "58846"
    #   - "27975"
    # published_ports:
    #   - 8112:8112
    #   - 27975:27975
    #   - 27975:27975/udp
    #   - 58846:58846
    #   - 58846:58846/udp
    #   - 6881:6881
    #   - 6881:6881/udp
    volumes:
      - "{{ docker_data_dir }}deluge_config:/config"
      - arr-downloads:/downloads
    env:
      PGID: "1000002" #docker user
      PUID: "1000"
      TZ: "America/Chicago"
      DELUGE_LOGLEVEL: error
    log_driver: "{{ docker_log_driver }}"
    log_options: "{{ docker_log_options}}"
    # dns_search_domains: "{{ dns_domains }}"
    # dns_servers: "{{ dns_servers }}"
    network_mode: "container:gluetun"
  tags:
    - deluge
    - arr